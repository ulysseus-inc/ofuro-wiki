name: 機能提案 / Feature request
description: 新機能・改善を提案する
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / Problem
      description: どんな課題・困りごとを解決したいですか？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容 / Proposal
      description: 望ましい挙動や実現方法のアイデアを記述してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 / Alternatives
      description: 検討した他の方法があれば記述してください。
    validations:
      required: false
