# ofuro-wiki — Nginx リバースプロキシ設定サンプル
#
# 使い方:
#   1. このファイルを /etc/nginx/sites-available/ofuro-wiki にコピー
#   2. example.com を自ドメインに置換
#   3. SSL証明書を取得: certbot --nginx -d wiki.example.com
#   4. シンボリックリンク: ln -s /etc/nginx/sites-available/ofuro-wiki /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name wiki.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name wiki.example.com;

    # SSL証明書（certbot が自動設定）
    ssl_certificate     /etc/letsencrypt/live/wiki.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.example.com/privkey.pem;

    # SSL設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # アップロードサイズ（Blob/画像アップロード用）
    client_max_body_size 100m;

    # WebSocket（Yjs リアルタイム同期）
    location /socket.io/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # アプリケーション本体
    location / {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
